<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="社畜取暖">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>💬 社畜專屬防暴走語錄產生器</title>
  <style>
    body {
      font-family: "Helvetica Neue", Helvetica, "PingFang TC", "LiHei Pro", "Microsoft JhengHei", sans-serif;
      background-color: #f0f2f5;
      padding: 2rem;
      text-align: center;
      margin: 0;
      color: #333;
    }
    h1 {
      color: #2c3e50;
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
    }
    p.subtitle {
      color: #7f8c8d;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .button-group {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 2rem;
    }
    button.category-btn {
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 20px;
      background-color: #34495e;
      color: white;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    button.category-btn:hover {
      background-color: #2c3e50;
      transform: translateY(-2px);
    }
    button.category-btn:active {
      transform: translateY(0);
    }
    .output {
      text-align: left;
      max-width: 650px;
      margin: 0 auto;
    }
    .quote {
      background: #fff;
      margin-bottom: 1rem;
      line-height: 1.6;
      border-left: 5px solid #e74c3c;
      padding: 1rem;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      animation: fadeIn 0.4s ease-in-out;
    }
    .quote-text {
      flex: 1;
      font-size: 1.05rem;
      color: #2c3e50;
      padding-right: 15px;
      font-weight: 500;
    }
    .copy-button {
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      border: none;
      border-radius: 6px;
      background-color: #ecf0f1;
      color: #333;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .copy-button:hover {
      background-color: #bdc3c7;
    }
    .copy-button.copied {
      background-color: #27ae60;
      color: white;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <h1>💬 社畜專屬防暴走語錄產生器</h1>
  <p class="subtitle">拒絕有毒的心靈雞湯，這裡只講真實的靠北話。</p>
  
  <div class="button-group">
    <button class="category-btn" onclick="generate('工作量相關')">工作量炸裂</button>
    <button class="category-btn" onclick="generate('主管相關')">主管很有事</button>
    <button class="category-btn" onclick="generate('壓力相關')">壓力山大</button>
  </div>
  
  <div class="output" id="output">
    </div>

  <script>
    // 擴充到每類 30 句，完全真實、口語、不假掰的風格
    const responses = {
      "工作量相關": [

        "這種屎量根本不是人做的，做不完是公司人手不足，不是你的錯。",

        "薪水就那點，是要拚什麼命？差不多就好。",
        "這麼多事，你只有兩隻手欸，當你千手觀音喔？",
        "先去點杯手搖飲壓壓驚，熱量治百病。",
        "裝忙也是一種職場藝術，今天先這樣吧。",
        "放著！明天再說，地球照樣轉。",
        "他們丟再多，你就慢慢做，急死他們。",
        "領多少錢做多少事，超過的都是做功德，你又不是菩薩。",
        "今天這工作量根本是土石流，下班必須吃頓好的補一下。",
        "先去拉個屎躲個十分鐘吧，薪水小偷當起來。",
        "這點錢做這麼多事，沒當場翻桌算你修養好了。",

        "不想做就先放著，有時候放著放著...主管就忘記了。",
        "把腦袋放空，手動就好，我們只是無情的打字機器。",
        "看到這堆爛事我都在心裡罵了十句髒話了，辛苦你了。",
        "這種爛缺，沒離職已經是對公司最大的仁慈了。",
        "不要太認真，太認真只會被塞更多工作而已。",
        "你一個月才領多少，幹嘛操總經理的心？",
        "事情做不完？那就不要做啊（去泡杯咖啡再說）。",
        "今天已經夠對得起這份薪水了，剩下的交給老天。",
        "別管那麼多了，適當擺爛有益身心健康。",
        "這工作量是把人當免洗筷用嗎？太瞎了。",
        "做不完就雙手一攤啊，不然能拿你怎樣？",
        "趕快下班！多待一分鐘都是對自己生命的不尊重。",
        "這堆狗屁倒灶的事，看一眼少活十年。",
        "先去樓下吹個風吧，這辦公室的空氣有毒。",
        "反正急的不是你，皇上不急急死太監而已。",
        "今天先這樣，剩下的明天再煩惱，再逼就離職！"
      ],
      "主管相關": [
        "他腦袋是不是裝水？講那什麼幹話。",
        "慣老闆日常啦，左耳進右耳出就好。",
        "當作看猴子耍戲，不要跟自己的情緒過不去。",
        "他今天出門是不是忘記帶智商？",
        "這種人能當主管，我看這公司也快了。",
        "在心裡多罵幾句髒話會舒服點。",
        "把他的話當放屁，雖然臭但很快就散了。",
        "真的超瞎，你沒當場翻他白眼算你人好。",
        "隨便附和他一下就好，認真你就輸了。",
        "他是不是更年期？脾氣那麼臭。",
        "有事鍾無艷，無事夏迎春，標準的職場垃圾。",
        "他只會出一張嘴，鍵盤指揮官而已，理他幹嘛。",
        "如果罵人能發電，你主管應該能供應整個台灣的電了。",
        "遇到這種鬼故事真的無解，下班去喝一杯壓壓驚。",
        "主管的嘴騙人的鬼，聽聽就算了千萬別當真。",
        "他懂個屁！我們自己知道自己有做事就好。",
        "別生氣了，為這種人生氣長皺紋不划算啊。",
        "沒事啦！全公司都知道是他有問題，不是你的錯。",
        "他那套早就過時了，就讓他繼續活在自己的象牙塔裡吧。",
        "遇到腦殘主管，就當作是在做修行。",
        "他只是在發洩情緒啦，你剛好掃到颱風尾而已。",
        "連他自己都不知道自己在講什麼，我們怎麼會懂？",
        "每天看他發瘋，我都懷疑是不是該叫救護車了。",
        "他說你不好絕對不是你的問題，是他眼瞎。",
        "跟這種人計較只會拉低你的智商，放生他吧。",
        "主管就是用來罵的，不然要同事群組幹嘛？",
        "聽他講話真的很浪費生命，趕快敷衍過去。",
        "他那點格局也只能當個只會罵人的小主管了。",
        "下次他再靠北，你就想像他在學豬叫。",
        "這世界上就是有這種不講理的白癡，辛苦你了。"
      ],
      "壓力相關": [
        "壓力大就打開 104 看看，看到別的屎缺心情會好一點。",
        "真的受不了就請假，特休不用會過期，休好休滿！",
        "今晚絕對要吃垃圾食物，先不管體重了，快樂最重要。",
        "下班秒關通知，不回訊息是常識，誰找你就當他死掉。",

        "不要什麼都自己扛，偶爾雷一下隊友又不會死。",
        "撐不下去就躺平啊，躺著多舒服。",
        "責任感太重只會搞死自己，放飛自我吧！",
        "喝杯酒睡一覺，明天的事情明天再煩。",
        "累了就去蹲廁所，那是全公司最安靜、唯一屬於你的地方。",
        "這世界本來就很爛，不要把自己逼太緊。",
        "想哭就哭，想罵髒話就大聲罵，沒什麼大不了的。",
        "哪來那麼多責任感，對得起你戶頭裡的薪水就好。",
        "不要硬撐，裝死一下真的不會怎麼樣啦！",
        "弦繃太緊會斷掉的，今天先放過自己好嗎？",
        "天塌下來有高個子頂著，你湊什麼熱鬧？",
        "把那些煩人的事情先丟到腦後，今晚追劇追到爽。",
        "就算今天擺爛一整天，地球還是照樣轉啦。",
        "遇到低潮沒關係，我們不是彈簧，不需要急著彈起來。",
        "你已經扛夠多了，把包袱丟一些給別人吧，自私一點。",
        "不要對自己太苛刻，你也是人，會累是正常的啊。",
        "看見你這麼累真的很心疼，今天就徹底擺爛吧！",
        "洗個熱水澡，把這間公司的髒空氣都洗掉。",
        "壓力是自己給的，放寬心，大不了就換工作而已。",
        "沒有什麼過不去的坎，只有過不去的薪水。",
        "今天表現不好又怎樣？老闆又沒給你一千萬獎金。",
        "先別想了，去買杯你想喝很久的飲料犒賞自己。",
        "人生又不是只有工作，趕快把靈魂抽離辦公室！",
        "太累就去請病假，身心不適也是病啊！",
        "管他的！先睡飽再說，明天的事明天的人會處理。"
      ]
    };

    function generate(type) {
      const output = document.getElementById("output");
      output.innerHTML = '';
      
      // 每次抽出 10 句，讓畫面看起來更豐富
      const data = [...responses[type]].sort(() => 0.5 - Math.random());
      const sampled = data.slice(0, 10);
      
      output.innerHTML = sampled.map(text => 
        `<div class="quote">
          <span class="quote-text">${text}</span>
          <button class="copy-button" onclick="copyQuote(this)">複製</button>
        </div>`
      ).join("");
    }
    
    function copyQuote(btn) {
      const quoteText = btn.parentElement.querySelector('.quote-text').innerText;
      
      navigator.clipboard.writeText(quoteText)
        .then(() => {
          const originalText = btn.innerText;
          btn.innerText = '✅ 已複製';
          btn.classList.add('copied');
          
          setTimeout(() => {
            btn.innerText = '複製';
            btn.classList.remove('copied');
          }, 2000);
        })
        .catch(err => {
          btn.innerText = '❌ 失敗';
          setTimeout(() => { btn.innerText = '複製'; }, 2000);
        });
    }
  </script>
</body>
</html>
